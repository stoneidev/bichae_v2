name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy Application
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js Cloudflare Bundle
        run: npm run pages:build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "----------------------------------------------------------------"
            echo "⚠️ CLOUDFLARE_API_TOKEN is not set in GitHub Secrets."
            echo "✅ Production Build & TypeCheck passed successfully!"
            echo "💡 Add CLOUDFLARE_API_TOKEN to GitHub Secrets to enable remote deployments."
            echo "----------------------------------------------------------------"
            exit 0
          else
            echo "🚀 Deploying assets to Cloudflare Pages..."
            npx wrangler pages deploy .vercel/output/static --project-name=bichae-v2
          fi
